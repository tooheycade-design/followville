<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Followville</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="description" content="A town where every follower is a house — walk it in your browser." />
<style>
  :root{
    --cream:#f2e9da;
    --cream-deep:#e9dcc4;
    --navy:#1c2b45;
    --navy-soft:#2c3f5e;
    --accent:#c96b4a;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { margin:0; padding:0; min-height:100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background:var(--navy);
    color:#fff;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding: 48px 20px 32px;
    position:relative;
    overflow-x:hidden;
  }

  .landing-media {
    position:fixed; inset:0; z-index:0; overflow:hidden; pointer-events:none;
    background:#527f99 url("assets/town-loop-poster.jpg") center 54% / cover no-repeat;
  }
  .landing-media video {
    width:100%; height:100%; object-fit:cover; object-position:center 54%;
    display:block; transform:scale(1.015); filter:saturate(.88) contrast(1.03);
  }
  .landing-shade {
    position:fixed; inset:0; z-index:0; pointer-events:none;
    background:
      linear-gradient(180deg, rgba(9,20,34,.38) 0%, rgba(9,20,34,.54) 52%, rgba(9,20,34,.76) 100%),
      radial-gradient(circle at 50% 24%, transparent 0 24%, rgba(9,20,34,.24) 78%);
  }

  .bg-grid {
    position:fixed; inset:0; z-index:0; pointer-events:none; opacity:0.12;
    background-image:
      linear-gradient(rgba(255,255,255,0.08) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.08) 1px, transparent 1px);
    background-size: 44px 44px;
    mask-image: radial-gradient(circle at 50% 30%, black 0%, transparent 75%);
  }

  .content { position:relative; z-index:1; width:100%; max-width:460px; display:flex; flex-direction:column; align-items:center; }

  .logo-ring {
    width:132px; height:132px; border-radius:50%;
    padding:5px;
    background: var(--cream);
    box-shadow: 0 14px 34px rgba(4,12,22,0.42);
    margin-bottom:22px;
  }
  .logo-ring img {
    width:100%; height:100%; border-radius:50%; object-fit:cover; display:block;
    background:var(--cream);
  }
  .logo-fallback {
    width:100%; height:100%; border-radius:50%; display:flex; align-items:center;
    justify-content:center; background:var(--cream); font-size:52px;
  }

  h1 {
    font-size:34px; margin:0 0 6px; letter-spacing:-0.5px; font-weight:800;
    text-align:center; text-shadow:0 3px 16px rgba(0,0,0,.48);
  }
  .tagline {
    margin:0 0 30px; opacity:0.75; font-size:15px; text-align:center; max-width:320px;
    line-height:1.45;
  }

  .stats {
    display:flex; gap:14px; width:100%; margin-bottom:28px;
  }
  .stat {
    flex:1; background:rgba(8,20,34,0.48); border:1px solid rgba(255,255,255,0.2);
    border-radius:18px; padding:18px 12px; text-align:center;
    backdrop-filter: blur(10px); box-shadow:0 10px 24px rgba(0,0,0,.12);
  }
  .stat .num {
    font-size:30px; font-weight:800; line-height:1; transition: transform 0.35s ease;
  }
  .stat .num.pulse { transform: scale(1.18); color: var(--accent); }
  .stat .label {
    font-size:11.5px; text-transform:uppercase; letter-spacing:0.08em; opacity:0.6;
    margin-top:6px; font-weight:600;
  }

  .enter-btn {
    display:flex; align-items:center; justify-content:center; gap:8px;
    width:100%; padding:16px 22px; border-radius:16px; border:none;
    background: var(--cream); color:var(--navy); font-size:16px; font-weight:700;
    text-decoration:none; box-shadow: 0 10px 24px rgba(28,43,69,0.25);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .enter-btn:active { transform: scale(0.97); }
  .enter-btn .arrow { transition: transform 0.15s ease; }
  .enter-btn:hover .arrow { transform: translateX(3px); }
  .enter-btn.claim {
    margin-top:12px; background:rgba(8,20,34,.38); color:#fff;
    border:2px solid rgba(255,255,255,.78); box-shadow:none;
    backdrop-filter:blur(8px);
  }
  .enter-btn.map {
    margin-top:12px; background:rgba(201,107,74,.94); color:#fff;
    box-shadow:0 10px 24px rgba(88,35,21,.24);
  }

  .hint {
    margin-top:14px; font-size:12.5px; opacity:0.55; text-align:center;
  }
  .account-line {
    margin-top:10px; font-size:12.5px; opacity:0.7; text-align:center;
  }
  .account-line a { color:#ffd5bd; }

  .founders-note {
    margin-top:38px; font-size:12.5px; opacity:0.55; text-align:center; line-height:1.6;
    max-width:320px;
  }

  @media (max-width: 380px){
    h1 { font-size:28px; }
    .stat .num { font-size:25px; }
  }

  @media (max-height: 620px){
    body { padding-top:28px; }
    .logo-ring { width:96px; height:96px; margin-bottom:14px; }
    h1 { font-size:26px; margin-bottom:4px; }
    .tagline { margin-bottom:18px; }
    .stats { margin-bottom:18px; }
  }

  @media (prefers-reduced-motion: reduce){
    .landing-media video { display:none; }
  }
</style>
</head>
<body>

<div class="landing-media" aria-hidden="true">
  <video id="landingVideo" autoplay muted loop playsinline preload="metadata"
         poster="assets/town-loop-poster.jpg" tabindex="-1">
    <source src="assets/town-loop.mp4" type="video/mp4" />
  </video>
</div>
<div class="landing-shade" aria-hidden="true"></div>
<div class="bg-grid"></div>

<div class="content">
  <div class="logo-ring">
    <img src="logo.png" alt="Followville" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'logo-fallback',textContent:'🏠'}))" />
  </div>

  <h1>Followville</h1>
  <p class="tagline">Walk it yourself, right in your browser.</p>

  <div class="stats">
    <div class="stat">
      <div class="num" id="statDay">–</div>
      <div class="label">Day</div>
    </div>
    <div class="stat">
      <div class="num" id="statPop">–</div>
      <div class="label">Population</div>
    </div>
  </div>

  <a class="enter-btn" href="town.html">
    Walk the town <span class="arrow">→</span>
  </a>
  <a class="enter-btn map" id="mapBtn" href="town.html#map">
    Explore the map <span class="arrow">→</span>
  </a>
  <a class="enter-btn claim" id="claimBtn" href="town.html#claim">
    Claim your home <span class="arrow">→</span>
  </a>
  <a class="enter-btn claim" id="adminBtn" href="admin.html" style="display:none;">
    Admin <span class="arrow">→</span>
  </a>
  <p class="hint">first-person · WASD or touch controls · desktop &amp; mobile</p>
  <p class="account-line" id="accountLine" style="display:none;">
    logged in as <b id="accountHandle"></b> · <a href="#" id="logoutLink">log out</a>
  </p>
</div>

<script>
  const landingVideo = document.getElementById("landingVideo");
  const useStaticLanding = window.matchMedia("(prefers-reduced-motion: reduce)").matches ||
    navigator.connection?.saveData;
  if (useStaticLanding){
    landingVideo.pause();
    landingVideo.removeAttribute("autoplay");
  } else {
    landingVideo.play().catch(() => {}); // the poster remains if autoplay is blocked
    document.addEventListener("visibilitychange", () => {
      if (document.hidden) landingVideo.pause();
      else landingVideo.play().catch(() => {});
    });
  }

  // Live stats: just reflects world_state.json's own fields, refreshed
  // periodically. No calendar/date math of any kind — the day counter and
  // population only ever change when the town itself is actually regrown
  // (via grow.sh), so polling the same source of truth is all "live" means
  // here. No guessing what day it "should" be.
  let lastDay = null, lastPop = null;

  function setStat(el, value){
    if (el.textContent !== String(value)){
      el.textContent = value;
      el.classList.remove("pulse");
      void el.offsetWidth; // restart animation
      el.classList.add("pulse");
    }
  }

  async function refreshStats(){
    try {
      const res = await fetch("world_state.json", { cache: "no-store" });
      const state = await res.json();
      const dayEl = document.getElementById("statDay");
      const popEl = document.getElementById("statPop");
      if (typeof state.day === "number") setStat(dayEl, state.day);
      if (typeof state.pop === "number") setStat(popEl, state.pop);
    } catch (err) {
      console.warn("couldn't load world_state.json for live stats", err);
    }
  }

  refreshStats();
  setInterval(refreshStats, 45000); // just re-checks the same file; harmless if nothing changed
</script>

<script type="module">
  // Session-aware landing: if you're already logged in (and have a house),
  // the claim button becomes "Go to my home" and a logged-in line appears.
  // Fails silently to the plain static page if anything here can't load.
  const SUPABASE_URL = "https://bposhxtidoyulallvhdp.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJwb3NoeHRpZG95dWxhbGx2aGRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2MDgwMzUsImV4cCI6MjA5OTE4NDAzNX0._WRwlwtwLBrJIsvYjK5tj6XxDB98k5c6GB1HJ7WfSXk";
  try {
    const { createClient } = await import("https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm");
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const { data } = await sb.auth.getSession();
    if (data?.session){
      const { data: status } = await sb.rpc("my_status");
      const handle = status?.profile?.instagram_handle;
      if (handle){
        document.getElementById("accountHandle").textContent = "@" + handle;
        document.getElementById("accountLine").style.display = "block";
        document.getElementById("logoutLink").onclick = async (e) => {
          e.preventDefault();
          await sb.auth.signOut();
          location.reload();
        };
      }
      if (status?.claim){
        const btn = document.getElementById("claimBtn");
        btn.href = "town.html#home";
        btn.innerHTML = 'Go to my home <span class="arrow">→</span>';
      }
      // admins-only button; the admin page itself is also server-side gated,
      // so hiding this is cosmetic, not the security boundary
      if (status?.profile?.is_admin){
        document.getElementById("adminBtn").style.display = "flex";
      }
    }
  } catch (e) {
    console.warn("account check skipped:", e);
  }
</script>
</body>
</html>
